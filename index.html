<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-dark" lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Ulas Nesil</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png">

    <meta name="description" content="Ulas Nesil — Music Producer &amp; Artist. Follow on TikTok, Instagram, and YouTube.">
    <meta name="keywords" content="Ulas Nesil, music producer, artist, Nesil Production">
    <meta rel="canonical" href="https://littlelink-eight-gamma.vercel.app">
    <meta name="author" content="Ulas Nesil">

    <!-- Open Graph -->
    <meta property="og:title" content="Ulas Nesil">
    <meta property="og:description" content="Music Producer &amp; Artist">
    <meta property="og:image" content="/images/avatar.png">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">
  </head>

<body>

    <div class="container">
        <div class="column">

            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="Ulas Nesil">

            <h1>
              <div>Ulas Nesil</div>
            </h1>

            <p>Music Producer &amp; Artist</p>

            <div class="button-stack" role="navigation">

              <!-- TikTok -->
              <a class="button button-tiktok" href="https://www.tiktok.com/@ulasnesil" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/tiktok.svg" alt="TikTok Logo">TikTok</a>

              <!-- Instagram -->
              <a class="button button-instagram" href="https://www.instagram.com/ulasnesil/" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">Instagram</a>

              <!-- YouTube -->
              <a class="button button-yt" href="https://www.youtube.com/@Nesilproduction" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/youtube.svg" alt="YouTube Logo">YouTube</a>

              <!-- Spotify -->
              <a class="button button-spotify" href="https://open.spotify.com/artist/6mffJ8eeqI5A4Gr1UhMOGB" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/spotify.svg" alt="Spotify Logo">Listen on Spotify</a>

              <!-- Website -->
              <a class="button button-default" href="https://ulasnesil.com" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-website.svg" alt="Website Icon">Website</a>

            </div>

    </div>
  </div>

</body>

</html>
